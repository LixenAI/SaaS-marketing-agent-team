services:
  - type: web
    name: lixenai-marketing-command-center
    runtime: static
    plan: free
    branch: webapp
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=300
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
